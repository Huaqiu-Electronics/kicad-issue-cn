name: Publish to Docker

on:
  release:
    branches: main
    types:
      - published
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  publish-docker-images:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest tag
        uses: oprypin/find-latest-tag@v1
        with:
          repository: Huaqiu-Electronics/kicad-issue-cn
          releases-only: true
        id: latest-release

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun
        uses: docker/login-action@v3
        with:
          registry: registry.cn-shanghai.aliyuncs.com
          username: Liangtie
          password: ${{ secrets.ALIYUNCS_DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            registry.cn-shanghai.aliyuncs.com/kicad/kicad-issue-cn
            ghcr.io/Huaqiu-Electronics/kicad-issue-cn
          tags: |
            ${{ steps.latest-release.outputs.tag }}
            latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GITLAB_TOKEN=${{ secrets.GITLAB_TOKEN }}